function updateComboTraining(dt) {
  if (!comboState) return;
  const c = comboState;
  c.phaseTime += dt;

  if (c.phase === 'demo') {
    // Auto-play opp doing the combo on the player
    const cycleTime = c.combo.seq.length * 0.5 + 0.6;
    const t = (c.phaseTime % cycleTime) / 0.5;
    const idx = Math.min(Math.floor(t), c.combo.seq.length - 1);
    if (idx !== c.seqIdx) {
      c.seqIdx = idx;
      const p = c.combo.seq[idx];
      // Trigger opp punch animation
      currentFight = currentFight || {}; // safety
      oppPunchAnim(p);
      renderComboHud();
    }
    if (c.phaseTime > cycleTime * 3 + 1.0) {
      c.phase = 'guide'; c.phaseTime = 0; c.seqIdx = 0; renderComboHud();
    }
  } else if (c.phase === 'guide') {
    // Wait for player input matching combo.seq[seqIdx]. Auto-advance after 8s if stuck.
    if (c.phaseTime > 12 || c.seqIdx >= c.combo.seq.length) {
      c.phase = 'metronome'; c.phaseTime = 0; c.seqIdx = 0; c.metronomePhase = 0; c.correct = 0; c.missed = 0; c.lateCount = 0;
      renderComboHud();
    }
  } else if (c.phase === 'metronome') {
    const beatDuration = 60 / c.bpm;
    c.metronomePhase += dt / beatDuration;
    if (c.metronomePhase >= 1) {
      // Beat tick — expected punch slot
      const expected = c.combo.seq[c.seqIdx];
      if (c.lastInputBeat !== c.metronomeBeat) {
        c.missed++;
      }
      c.metronomePhase = 0; c.metronomeBeat = (c.metronomeBeat || 0) + 1;
      // Cue with sound
      playStep && playStep();
      // Auto-advance combo position if it completed
      if (c.seqIdx >= c.combo.seq.length) {
        c.seqIdx = 0;
        // Round complete — accuracy check
        const total = c.correct + c.missed + c.lateCount;
        const acc = total > 0 ? c.correct / total : 0;
        if (acc >= 0.8 && c.bpm < c.combo.bpm[1]) {
          c.bpm = Math.min(c.bpm + 10, c.combo.bpm[1]);
        } else if (acc < 0.4 && c.bpm > c.combo.bpm[0]) {
          c.bpm = Math.max(c.bpm - 10, c.combo.bpm[0]);
        }
      }
    }
    if (c.phaseTime > 25 || c.bpm >= c.combo.bpm[1]) {
      c.phase = 'applied'; c.phaseTime = 0; c.seqIdx = 0; c.appliedRound = 0;
      c.appliedSeq = randomCombo(); renderComboHud();
    }
    renderComboHud();
  } else if (c.phase === 'applied') {
    if (c.phaseTime > 5 && c.seqIdx < c.appliedSeq.length) {
      // Failed this round
      c.missed++;
      c.appliedRound++;
      if (c.appliedRound >= 5) finishCombo();
      else { c.appliedSeq = randomCombo(); c.seqIdx = 0; c.phaseTime = 0; renderComboHud(); }
    }
  }
}

function randomCombo() {
  const allTokens = ['jab','cross','hook','uppercut'];
  const len = 2 + Math.floor(Math.random() * 3); // 2..4
  const arr = [];
  for (let i = 0; i < len; i++) arr.push(allTokens[Math.floor(Math.random() * allTokens.length)]);
  return arr;
}

function comboHandlePunch(type) {
  if (!comboState) return;
  const c = comboState;
  if (c.phase === 'guide') {
    const expected = c.combo.seq[c.seqIdx];
    if (type === expected) {
      c.seqIdx++; playPunch && playPunch('light');
      if (c.seqIdx >= c.combo.seq.length) {
        // Reset for next demo loop
        setTimeout(() => { if (comboState && comboState.phase === 'guide') { c.seqIdx = 0; renderComboHud(); } }, 500);
      }
      renderComboHud();
    } else {
      // wrong — no advance, brief shake
      c.missed++;
    }
  } else if (c.phase === 'metronome') {
    const expected = c.combo.seq[c.seqIdx];
    const tolerance = 0.25;
    const offBeat = Math.min(c.metronomePhase, 1 - c.metronomePhase);
    if (type === expected && offBeat < tolerance) {
      c.correct++; c.seqIdx = (c.seqIdx + 1) % c.combo.seq.length;
      c.score += Math.round(10 * (1 - offBeat * 2));
      c.lastInputBeat = c.metronomeBeat;
      playPunch && playPunch('light');
    } else if (type === expected) {
      c.lateCount++; c.score += 2;
    } else { c.missed++; }
    renderComboHud();
  } else if (c.phase === 'applied') {
    const expected = c.appliedSeq[c.seqIdx];
    if (type === expected) {
      c.seqIdx++; c.correct++; c.score += 12;
      playPunch && playPunch('light');
      if (c.seqIdx >= c.appliedSeq.length) {
        c.appliedRound++;
        if (c.appliedRound >= 5) { finishCombo(); return; }
        c.appliedSeq = randomCombo(); c.seqIdx = 0; c.phaseTime = 0;
      }
      renderComboHud();
    } else { c.missed++; }
  }
}

function finishCombo() {
  if (!comboState) return;
  const c = comboState;
  c.phase = 'done';
  // Stars based on accuracy & bpm
  const total = c.correct + c.missed;
  const acc = total > 0 ? c.correct / total : 0;
  const bpmRange = c.combo.bpm[1] - c.combo.bpm[0];
  const bpmFrac = bpmRange > 0 ? (c.bpm - c.combo.bpm[0]) / bpmRange : 0;
  c.finalStars = Math.max(1, Math.min(5, Math.round((acc * 0.6 + bpmFrac * 0.4) * 5)));
  // Save
  const prev = save.comboMastery[c.combo.id] || { stars: 0, bestBpm: 0 };
  save.comboMastery[c.combo.id] = {
    stars: Math.max(prev.stars, c.finalStars),
    bestBpm: Math.max(prev.bestBpm, Math.round(c.bpm))
  };
  save.trainCount.combo = (save.trainCount.combo || 0) + 1;
  save.xp += 30 + c.finalStars * 12;
  saveSave();
  renderComboHud();
  setTimeout(() => { if (comboState && comboState.phase === 'done') { comboState = null; currentTraining = null; showCombos(); } }, 4500);
}

function oppPunchAnim(type) {
  // Drive opponent through animatePunch using a fake fight state
  if (!currentFight) currentFight = {};
  currentFight.oppPunchAnim = 0.001;
  currentFight.oppPunchType = type;
}

// ==================== TRAINING MINI-GAMES ====================
function startTraining(type) {
  hideAll();
  currentScreen = 'train';
  $('backBtn').classList.remove('hidden');
  $('trainOverlay').classList.remove('hidden');

  // Show 3D scene for sparring
  if (type === 'sparring') {
    playerModel.group.visible = true;
    oppModel.group.visible = true;
    playerModel.group.position.set(0, 0, 3);
    oppModel.group.position.set(0, 0, -1.5);
    playerModel.group.rotation.y = Math.PI;
    oppModel.group.rotation.y = 0;
    camReset();
    $('camControls').classList.remove('hidden');
    flashCamHint();
    if ('ontouchstart' in window) $('mobileControls').classList.remove('hidden');
  } else {
    playerModel.group.visible = false;
    oppModel.group.visible = false;
    camera.position.set(0, 4, 8);
    camera.lookAt(0, 2.5, 0);
  }

  currentTraining = {
    type, active: true,
    timer: 30, score: 0, hits: 0, misses: 0,
    sbPhase: 0, sbTarget: 0, sbHit: false,
    hbCombo: [], hbTarget: [], hbIdx: 0,
    jrPhase: 0, jrSpeed: 2, jrJumping: false, jrY: 0,
    spHP: 100, spOppHP: 100, spAction: null, spActionTime: 0
  };

  if (type === 'heavybag') {
    const combos = [['jab', 'cross'], ['jab', 'cross', 'hook'], ['jab', 'jab', 'cross'], ['hook', 'uppercut']];
    currentTraining.hbTarget = combos[Math.floor(Math.random() * combos.length)];
  }

  updateTrainOverlay();
}

function updateTrainOverlay() {
  const t = currentTraining;
  if (!t || !t.active) return;
  const nameMap = { jab: '잽(1)', cross: '크로스(2)', hook: '훅(3)', uppercut: '어퍼(4)' };
  const typeNames = { speedbag: '스피드백', heavybag: '헤비백', jumprope: '줄넘기', sparring: '스파링' };
  let html = `<div class="train-hud">
    <div style="font-size:22px;font-weight:700;color:var(--accent)">${typeNames[t.type]}</div>
    <div style="font-size:16px;margin:4px 0">점수: <b style="color:var(--gold)">${t.score}</b></div>
    <div style="font-size:13px;color:var(--dim)">${Math.ceil(t.timer)}초 남음</div>
    <div style="width:200px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin:8px auto">
      <div style="width:${t.timer / 30 * 100}%;height:100%;background:var(--accent);border-radius:2px"></div>
    </div>`;

  if (t.type === 'speedbag') {
    html += `<div class="train-target" style="color:${t.sbTarget ? 'var(--green)' : 'var(--dim)'};font-size:28px;margin:16px 0">${t.sbTarget ? '지금! 탭하세요!' : '대기...'}</div>
    <div style="font-size:12px;color:var(--dim)">초록색일 때 아무 키(1/2/3/4) 또는 탭</div>`;
  } else if (t.type === 'heavybag') {
    html += `<div style="margin:12px 0;font-size:14px">콤보 입력:</div>
    <div class="train-combo-seq">${t.hbTarget.map((p, i) =>
      `<div class="train-combo-item ${i < t.hbIdx ? 'done' : i === t.hbIdx ? 'current' : ''}">${nameMap[p]}</div>`
    ).join('')}</div>`;
  } else if (t.type === 'jumprope') {
    html += `<div class="train-target" style="font-size:24px;margin:16px 0">스페이스바/탭으로 점프!</div>`;
  } else if (t.type === 'sparring') {
    html += `<div style="margin:8px 0">
      <div style="width:160px;height:8px;background:rgba(255,255,255,.1);border-radius:4px;margin:4px auto">
        <div style="width:${t.spOppHP}%;height:100%;background:var(--accent);border-radius:4px"></div>
      </div>
      <div style="font-size:11px;color:var(--dim)">상대 체력</div>
    </div>
    <div style="font-size:12px;color:var(--dim)">1=잽 2=크로스 3=훅 4=어퍼</div>`;
  }

  html += '</div>';
  $('trainOverlay').innerHTML = html;
}

function updateTraining(dt) {
  const t = currentTraining;
  if (!t || !t.active) return;

  t.timer -= dt;
  if (t.timer <= 0) { endTraining(); return; }

  if (t.type === 'speedbag') {
    t.sbPhase += dt * 3;
    t.sbTarget = Math.sin(t.sbPhase) > 0.7 ? 1 : 0;
  } else if (t.type === 'jumprope') {
    t.jrPhase += dt * t.jrSpeed;
    if (t.jrJumping) {
      t.jrY = Math.sin(t.jrPhase * Math.PI) * 30;
      if (t.jrPhase >= 1) { t.jrJumping = false; t.jrPhase = 0; }
    }
  }
  if (t.spActionTime > 0) t.spActionTime -= dt;

  // Update overlay every few frames
  if (Math.floor(t.timer * 4) !== Math.floor((t.timer + dt) * 4)) {
    updateTrainOverlay();
  }
}

function trainingInput(action) {
  const t = currentTraining;
  if (!t || !t.active) return;

  if (t.type === 'speedbag') {
    if (t.sbTarget) { t.score += 10; t.hits++; t.sbHit = true; setTimeout(() => { if (t) t.sbHit = false; }, 100); playPunch('light'); }
    else { t.misses++; }
  } else if (t.type === 'heavybag') {
    const expected = t.hbTarget[t.hbIdx];
    if (action === expected) {
      t.score += 15; t.hits++; t.hbIdx++; playPunch(action === 'hook' || action === 'uppercut' ? 'heavy' : 'light');
      if (t.hbIdx >= t.hbTarget.length) {
        t.score += 30; t.hbIdx = 0;
        const combos = [['jab', 'cross'], ['jab', 'cross', 'hook'], ['jab', 'jab', 'cross'], ['hook', 'uppercut'], ['jab', 'cross', 'hook', 'uppercut']];
        t.hbTarget = combos[Math.floor(Math.random() * combos.length)];
        showComboText('콤보 완성!');
      }
    } else { t.misses++; t.hbIdx = 0; }
  } else if (t.type === 'jumprope') {
    if (!t.jrJumping) { t.jrJumping = true; t.jrPhase = 0; t.score += 5; t.hits++; playStep(); }
  } else if (t.type === 'sparring') {
    if (t.spActionTime > 0) return;
    t.spOppHP -= 5 + Math.random() * 5;
    t.score += 10; t.hits++; t.spActionTime = 0.3; playPunch('light');
    if (t.spOppHP <= 0) { t.spOppHP = 100; t.score += 50; showComboText('다운!'); }
  }
  updateTrainOverlay();
}

function endTraining() {
  const t = currentTraining;
  t.active = false;

  const statMap = { speedbag: 'speed', heavybag: 'power', jumprope: 'stamina', sparring: 'defense' };
  const stat = statMap[t.type];
  const gain = Math.max(1, Math.floor(t.score / 50));
  save.stats[stat] = Math.min(99, save.stats[stat] + gain);
  save.trainCount[t.type] = (save.trainCount[t.type] || 0) + 1;
  save.xp += Math.floor(t.score / 5);
  saveSave();

  const nameMap = { speedbag: '스피드백', heavybag: '헤비백', jumprope: '줄넘기', sparring: '스파링' };
  $('trainOverlay').classList.add('hidden');
  $('trainResult').classList.remove('hidden');
  $('trainResult').innerHTML = `
    <h2>${nameMap[t.type]} 완료!</h2>
    <div class="detail">점수: <b>${t.score}</b></div>
    <div class="detail">히트: <b>${t.hits}</b> | 미스: <b>${t.misses}</b></div>
    <div class="detail" style="color:var(--green);margin-top:10px">${{ speed: '스피드', power: '파워', stamina: '스태미나', defense: '방어력' }[stat]} +${gain}</div>
    <div class="detail" style="color:var(--gold)">XP +${Math.floor(t.score / 5)}</div>
    <button class="confirm-btn" onclick="afterTraining()">확인</button>
  `;
  playBell();
}

function afterTraining() {
  $('trainResult').classList.add('hidden');
  if (save.xp >= save.xpNext) {
    save.xp -= save.xpNext;
    save.level++;
    save.xpNext = Math.floor(save.xpNext * 1.3);
    showLevelUp();
  } else showMain();
}

// ==================== INPUT ====================
const keys = {};
document.addEventListener('keydown', e => {
  if (keys[e.code]) return;
  keys[e.code] = true;
  handleInput(e.code, 'down');
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  handleInput(e.code, 'up');
});

function handleInput(code, dir) {
  if (currentScreen === 'fight' && currentFight && currentFight.active && currentFight.phase === 'fight') {
    if (dir === 'down') {
      switch (code) {
        case 'Digit1': case 'KeyJ': playerPunch('jab'); break;
        case 'Digit2': case 'KeyK': playerPunch('cross'); break;
        case 'Digit3': case 'KeyL': playerPunch('hook'); break;
        case 'Digit4': case 'Semicolon': playerPunch('uppercut'); break;
        case 'KeyQ': playerDodge('slipL'); break;
        case 'KeyE': playerDodge('slipR'); break;
        case 'KeyS': playerDodge('duck'); break;
        case 'KeyA': playerGuard('high'); break;
        case 'KeyD': playerGuard('low'); break;
      }
    }
    if (dir === 'up') {
      if (code === 'KeyA' || code === 'KeyD') releaseGuard();
    }
  }
  if (currentScreen === 'train' && currentTraining && currentTraining.active && dir === 'down') {
    if (currentTraining.type === 'speedbag' || currentTraining.type === 'jumprope') {
      if (['Digit1', 'Digit2', 'Digit3', 'Digit4', 'Space', 'KeyJ', 'KeyK', 'KeyL'].includes(code)) trainingInput('any');
    } else if (currentTraining.type === 'heavybag' || currentTraining.type === 'sparring') {
      switch (code) {
        case 'Digit1': case 'KeyJ': trainingInput('jab'); break;
        case 'Digit2': case 'KeyK': trainingInput('cross'); break;
        case 'Digit3': case 'KeyL': trainingInput('hook'); break;
        case 'Digit4': case 'Semicolon': trainingInput('uppercut'); break;
      }
    }
  }
}

// Touch controls (for non-button areas)
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
document.addEventListener('touchstart', e => {
  if (e.target.closest('.overlay, .menu-btn, .confirm-btn, .alloc-btn, .back-btn, .opponent-card, .mobile-controls, .ctrl-btn, .train-overlay')) return;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchStartTime = performance.now();

  if (currentScreen === 'train' && currentTraining && currentTraining.active) {
    if (currentTraining.type === 'speedbag' || currentTraining.type === 'jumprope') trainingInput('any');
  }
}, { passive: true });

document.addEventListener('touchend', e => {
  if (e.target.closest('.mobile-controls, .ctrl-btn')) { releaseGuard(); return; }
  releaseGuard();
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const dt = performance.now() - touchStartTime;
  if (dt < 300 && currentScreen === 'fight') {
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) playerDodge(dx < 0 ? 'slipL' : 'slipR');
    else if (dy > 50) playerDodge('duck');
  }
}, { passive: true });

// ==================== 3D RENDER UPDATE ====================
function update3DScene(time, dt) {
  const f = currentFight;

  if (currentScreen === 'fight' && f) {
    // Reset poses
    resetBoxerPose(playerModel);
    resetBoxerPose(oppModel);

    // Idle animation
    animateBoxerIdle(playerModel, time);
    animateBoxerIdle(oppModel, time);

    // Player dodge
    if (f.playerDodgeTime > 0.1) {
      animateDodge(playerModel, f.playerDodge, f.playerDodgeTime / 0.4);
    }

    // Player guard
    if (f.playerGuard !== 'none') {
      animateBlock(playerModel, f.playerGuard);
    }

    // Player punch animation
    if (f.playerPunchAnim > 0) {
      animatePunch(playerModel, f.playerPunchType, 1 - f.playerPunchAnim / 0.35, false);
    }

    // Opponent punch animation
    if (f.oppPunchAnim > 0) {
      animatePunch(oppModel, f.oppPunchType, 1 - f.oppPunchAnim / 0.3, true);
    }

    // Hit reactions
    if (f.playerHitAnim > 0) animateHit(playerModel, f.playerHitAnim / 0.3);
    if (f.oppHitAnim > 0) animateHit(oppModel, f.oppHitAnim / 0.3);

    // Punch trail effect
    updatePunchTrail(playerModel, f.playerPunchAnim > 0);
    updatePunchTrail(oppModel, f.oppPunchAnim > 0);
    if (f.playerPunchAnim <= 0) clearTrails(playerModel);
    if (f.oppPunchAnim <= 0) clearTrails(oppModel);

    // Kinetic chain glow
    if (f.playerPunchAnim > 0) {
      showKineticChainGlow(playerModel, f.playerPunchType, 1 - f.playerPunchAnim / 0.35);
    } else {
      clearGlow();
    }

    // Coaching cooldown
    if (coachingTimer > 0) coachingTimer -= dt;

    // Foot guides visibility during fight
    if (footGuides) footGuides.visible = false;

    // Camera shake
    if (f.shakeAmount > 0.3) {
      cameraShake.x = (Math.random() - 0.5) * f.shakeAmount * 0.05;
      cameraShake.y = (Math.random() - 0.5) * f.shakeAmount * 0.05;
    } else {
      cameraShake.x *= 0.9;
      cameraShake.y *= 0.9;
    }

    // Auto mode breathes the orbit slightly; user mode locks to user input
    if (!camState.userActive) {
      camState.azimuth = 0.55 + Math.sin(time * 0.25) * 0.04;
      camState.polar = 1.25 + Math.sin(time * 0.18) * 0.02;
    }
    applyOrbitCamera();

    // Flash overlay using ambient light
    if (f.flashAmount > 0.05) {
      scene.background = new THREE.Color(
        0.02 + f.flashAmount * 0.3,
        0.02,
        0.03
      );
    } else {
      scene.background = new THREE.Color(0x050508);
    }

  } else if (currentScreen === 'combo' && comboState) {
    resetBoxerPose(playerModel);
    resetBoxerPose(oppModel);
    animateBoxerIdle(playerModel, time);
    animateBoxerIdle(oppModel, time);
    // Drive punch anims via faux currentFight set in playerPunch / oppPunchAnim
    if (currentFight) {
      if (currentFight.playerPunchAnim > 0) {
        currentFight.playerPunchAnim = Math.max(0, currentFight.playerPunchAnim - dt / 0.42);
        animatePunch(playerModel, currentFight.playerPunchType, 1 - currentFight.playerPunchAnim, false);
      }
      if (currentFight.oppPunchAnim > 0) {
        currentFight.oppPunchAnim = Math.max(0, currentFight.oppPunchAnim - dt / 0.45);
        animatePunch(oppModel, currentFight.oppPunchType, 1 - currentFight.oppPunchAnim, true);
      }
    }
    applyOrbitCamera();
  } else if (currentScreen === 'train' && currentTraining && currentTraining.type === 'sparring') {
    resetBoxerPose(playerModel);
    resetBoxerPose(oppModel);
    animateBoxerIdle(playerModel, time);
    animateBoxerIdle(oppModel, time);

    if (camState.userActive) {
      applyOrbitCamera();
    } else {
      camera.position.set(1.5, 5, 8);
      camera.lookAt(0, 3, 1);
    }
  } else {
    // Menu — show RPM preview if loaded
    if (rpmPreviewModel) {
      rpmPreviewModel.rotation.y += dt * 0.5;
    }
    if (camState.userActive) {
      applyOrbitCamera();
    } else if (rpmPreviewModel) {
      camera.position.set(-3.5 + Math.sin(time * 0.15) * 1.5, 4, 5);
      camera.lookAt(-3.5, 2.2, 1);
    } else {
      // Menu scene - slow camera rotation
      camera.position.x = Math.sin(time * 0.15) * 8;
      camera.position.z = Math.cos(time * 0.15) * 8;
      camera.position.y = 4 + Math.sin(time * 0.1) * 0.5;
      camera.lookAt(0, 1.5, 0);
    }
  }

  updateParticles3D(dt);
}

// ==================== MAIN LOOP ====================
function gameLoop() {
  requestAnimationFrame(gameLoop);
  const dt = Math.min(clock.getDelta(), 0.05);
  const time = clock.getElapsedTime();

  if (currentScreen === 'fight') updateFight(dt);
  else if (currentScreen === 'train') updateTraining(dt);
  else if (currentScreen === 'combo') updateComboTraining(dt);

  update3DScene(time, dt);
  renderer.render(scene, camera);
}

// ==================== INIT ====================
function init() {
  loadSave();
  initThree();
  showMain();
  gameLoop();
}

window.addEventListener('load', init);
</script>
