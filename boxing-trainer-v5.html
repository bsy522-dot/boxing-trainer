<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Boxing Trainer V5 - 3D Career Mode</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a10;--panel:rgba(14,14,22,.95);--accent:#e63946;--accent2:#ff6b35;--text:#f0f0f0;--dim:#6a6a7e;--border:rgba(255,255,255,.08);--green:#22c55e;--yellow:#eab308;--blue:#3b82f6;--gold:#ffd700}
html,body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;width:100vw;touch-action:none;user-select:none}
#c3d{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,16,.92);backdrop-filter:blur(8px)}
.overlay.hidden{display:none}
.menu-title{font-size:48px;font-weight:900;letter-spacing:6px;color:var(--accent);text-shadow:0 0 30px rgba(230,57,70,.5);margin-bottom:8px}
.menu-sub{font-size:14px;color:var(--dim);margin-bottom:30px;letter-spacing:2px}
.menu-btn{display:block;width:280px;padding:14px 20px;margin:6px auto;background:var(--panel);border:2px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;text-align:left;letter-spacing:1px}
.menu-btn:hover{border-color:var(--accent);background:rgba(230,57,70,.1);transform:translateX(4px)}
.menu-btn .icon{display:inline-block;width:30px;font-size:20px}
.menu-btn .sub{display:block;font-size:11px;color:var(--dim);margin-top:2px;font-weight:400}
.menu-btn.locked{opacity:.4;pointer-events:none}
.back-btn{position:fixed;top:15px;left:15px;z-index:100;padding:8px 16px;background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--dim);font-size:13px;cursor:pointer;transition:all .2s}
.back-btn:hover{border-color:var(--accent);color:var(--text)}
.back-btn.hidden{display:none}
.stats-bar{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;justify-content:center}
.stat-pill{padding:4px 12px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--dim)}
.stat-pill b{color:var(--accent);margin-left:4px}
.opponent-card{width:320px;padding:16px;background:var(--panel);border:2px solid var(--border);border-radius:12px;margin:8px;text-align:center;cursor:pointer;transition:all .2s}
.opponent-card:hover{border-color:var(--accent);transform:scale(1.02)}
.opponent-card.locked{opacity:.35;pointer-events:none}
.opponent-card .name{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:2px}
.opponent-card .style{font-size:12px;color:var(--dim);margin:4px 0}
.opponent-card .record{font-size:11px;color:var(--yellow)}
.opp-stats{display:flex;gap:4px;justify-content:center;margin-top:8px}
.opp-stat{font-size:10px;padding:2px 8px;background:rgba(255,255,255,.04);border-radius:10px;color:var(--dim)}
.belt-display{text-align:center;margin:10px 0}
.belt-display .belt{font-size:28px;font-weight:900;letter-spacing:3px}
.belt-display .belt.regional{color:#cd7f32}
.belt-display .belt.national{color:#c0c0c0}
.belt-display .belt.continental{color:var(--gold)}
.belt-display .belt.world{color:var(--accent);text-shadow:0 0 20px var(--accent)}
.fight-result{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);backdrop-filter:blur(10px)}
.fight-result.hidden{display:none}
.fight-result .result-text{font-size:64px;font-weight:900;letter-spacing:8px;text-shadow:0 0 40px currentColor}
.fight-result .result-text.win{color:var(--green)}
.fight-result .result-text.lose{color:var(--accent)}
.fight-result .result-text.ko{color:var(--gold)}
.result-stats{margin:20px 0;text-align:center}
.result-stats div{font-size:14px;color:var(--dim);margin:4px 0}
.result-stats b{color:var(--text)}
.train-game{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50}
.train-game.hidden{display:none}
/* HUD */
.hud-top{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:linear-gradient(180deg,rgba(0,0,0,.9),transparent);pointer-events:none}
.hud-top.hidden{display:none}
.hud-top>*{pointer-events:auto}
.hud-top .round-info{font-size:14px;font-weight:700;letter-spacing:2px}
.hud-top .timer{font-size:28px;font-weight:900;letter-spacing:3px;color:var(--accent)}
.hp-bar-wrap{display:flex;align-items:center;gap:8px;margin:0 10px}
.hp-bar{width:180px;height:14px;background:rgba(255,255,255,.08);border-radius:7px;overflow:hidden;position:relative}
.hp-bar .fill{height:100%;border-radius:7px;transition:width .3s}
.hp-bar .fill.player{background:linear-gradient(90deg,var(--green),#4ade80)}
.hp-bar .fill.opp{background:linear-gradient(90deg,var(--accent),#f87171)}
.hp-label{font-size:11px;font-weight:700;min-width:40px}
.stamina-bar{width:120px;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.stamina-bar .fill{height:100%;background:var(--yellow);border-radius:3px;transition:width .2s}
.combo-popup{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);z-index:30;font-size:48px;font-weight:900;color:var(--accent2);text-shadow:0 0 20px rgba(255,107,53,.6);pointer-events:none;opacity:0;transition:opacity .3s}
.combo-counter{position:fixed;top:55%;right:20px;z-index:20;font-size:18px;font-weight:700;color:var(--accent2);text-shadow:0 0 10px rgba(255,107,53,.4);pointer-events:none;opacity:0;transition:opacity .3s}
.combo-counter.hidden{display:none}
/* Mobile controls */
.mobile-controls{position:fixed;bottom:0;left:0;right:0;z-index:15;display:none;flex-direction:column;gap:6px;padding:8px;pointer-events:none}
@media(pointer:coarse){.mobile-controls{display:flex}}
.mobile-controls.hidden{display:none}
.ctrl-row{display:flex;gap:6px;justify-content:center;pointer-events:auto}
.ctrl-btn{flex:1;max-width:90px;padding:12px 6px;background:rgba(14,14,22,.85);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:rgba(255,255,255,.7);font-size:11px;font-weight:600;text-align:center;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.ctrl-btn:active{background:rgba(230,57,70,.25);border-color:var(--accent);transform:scale(.95)}
.ctrl-btn.atk{border-color:rgba(230,57,70,.3)}
.ctrl-btn.def{border-color:rgba(59,130,246,.3)}
.controls-hint{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:20;font-size:10px;color:var(--dim);text-align:center;background:var(--panel);padding:6px 16px;border-radius:20px;border:1px solid var(--border)}
.controls-hint.hidden{display:none}
@media(pointer:coarse){.controls-hint{display:none!important}}
.level-up{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.9)}
.level-up.hidden{display:none}
.level-up h2{font-size:36px;color:var(--gold);margin-bottom:20px;letter-spacing:4px}
.stat-alloc{display:flex;flex-direction:column;gap:10px;margin:15px 0}
.stat-alloc-row{display:flex;align-items:center;gap:12px;font-size:14px}
.stat-alloc-row .sname{width:80px;text-align:right;color:var(--dim)}
.stat-alloc-row .sval{width:30px;text-align:center;font-weight:700;color:var(--accent)}
.alloc-btn{width:32px;height:32px;border-radius:50%;background:var(--panel);border:2px solid var(--border);color:var(--text);font-size:18px;cursor:pointer;transition:all .2s}
.alloc-btn:hover{border-color:var(--accent);background:rgba(230,57,70,.15)}
.alloc-btn:disabled{opacity:.3;cursor:default}
.confirm-btn{padding:12px 40px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:20px;letter-spacing:2px;transition:all .2s}
.confirm-btn:hover{background:#c1303c;box-shadow:0 0 20px rgba(230,57,70,.4)}
.confirm-btn:disabled{opacity:.4;cursor:default}
.train-result{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.88)}
.train-result.hidden{display:none}
.train-result h2{font-size:28px;color:var(--gold);margin-bottom:10px}
.train-result .detail{font-size:14px;color:var(--dim);margin:4px 0}
.train-result .detail b{color:var(--text)}
.career-list{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;max-width:700px;padding:10px;max-height:60vh;overflow-y:auto}
.fight-history{max-width:400px;max-height:50vh;overflow-y:auto;margin:10px 0}
.fh-row{display:flex;justify-content:space-between;padding:6px 12px;font-size:12px;border-bottom:1px solid var(--border)}
.fh-row .w{color:var(--green)}
.fh-row .l{color:var(--accent)}
.rest-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:25;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.rest-screen.hidden{display:none}
.rest-screen h2{font-size:32px;color:var(--yellow);margin-bottom:10px}
.rest-screen .timer{font-size:48px;font-weight:900;color:var(--text)}
/* Training overlay */
.train-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.train-overlay.hidden{display:none}
.train-overlay *{pointer-events:auto}
.train-hud{background:rgba(0,0,0,.6);border-radius:12px;padding:16px 24px;text-align:center;margin:8px}
.train-target{font-size:22px;font-weight:700;color:var(--accent);margin:8px 0}
.train-combo-seq{display:flex;gap:8px;justify-content:center;margin:8px 0}
.train-combo-item{padding:6px 14px;border-radius:8px;font-size:14px;font-weight:600;background:rgba(255,255,255,.05);color:var(--dim);border:1px solid var(--border)}
.train-combo-item.done{color:var(--green);border-color:var(--green)}
.train-combo-item.current{color:var(--accent);border-color:var(--accent);background:rgba(230,57,70,.1)}
/* Camera controls */
.cam-controls{position:fixed;right:12px;bottom:12px;z-index:18;display:flex;flex-direction:column;gap:6px;pointer-events:auto}
.cam-controls.hidden{display:none}
.cam-btn{width:44px;height:44px;border-radius:10px;background:rgba(14,14,22,.85);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.85);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;padding:0}
.cam-btn:hover,.cam-btn:active{border-color:var(--accent);background:rgba(230,57,70,.18)}
.cam-btn.small{font-size:18px;font-weight:900}
.cam-hint{position:fixed;left:50%;transform:translateX(-50%);top:8px;z-index:18;font-size:10px;color:var(--dim);background:var(--panel);padding:4px 10px;border-radius:14px;border:1px solid var(--border);pointer-events:none;opacity:0;transition:opacity .3s}
.cam-hint.show{opacity:1}
</style>
</head>
<body>
<canvas id="c3d"></canvas>

<!-- MAIN MENU -->
<div class="overlay" id="mainMenu">
<div class="menu-title">BOXING</div>
<div class="menu-sub">TRAINER V5 — 3D CAREER MODE</div>
<div id="playerInfo" style="margin-bottom:15px"></div>
<button class="menu-btn" onclick="showCareer()"><span class="icon">&#x1F94A;</span> 커리어 모드<span class="sub">랭킹을 올려 챔피언에 도전하세요</span></button>
<button class="menu-btn" onclick="showTraining()"><span class="icon">&#x1F3CB;&#xFE0F;</span> 트레이닝<span class="sub">스피드백, 헤비백, 줄넘기, 스파링</span></button>
<button class="menu-btn" onclick="showRecords()"><span class="icon">&#x1F4CA;</span> 전적 / 스탯<span class="sub">파이트 기록과 능력치 확인</span></button>
<button class="menu-btn" onclick="quickFight()"><span class="icon">&#x26A1;</span> 퀵 매치<span class="sub">랜덤 상대와 즉시 대전</span></button>
<button class="menu-btn" onclick="openRPMCreator()"><span class="icon">&#x1F464;</span> 내 아바타 만들기<span class="sub">Ready Player Me로 자기 얼굴/체형 아바타</span></button>
<button class="menu-btn" id="rpmClearBtn" onclick="clearRPMAvatar()" style="display:none;border-color:rgba(255,193,7,.3)"><span class="icon">&#x1F5D1;&#xFE0F;</span> 기본 캐릭터로 복귀<span class="sub">RPM 아바타 제거</span></button>
<button class="menu-btn" onclick="resetAll()" style="border-color:rgba(230,57,70,.3)"><span class="icon">&#x1F504;</span> 데이터 초기화<span class="sub">모든 진행 상황을 리셋합니다</span></button>
</div>

<!-- RPM Avatar Creator Overlay -->
<div class="overlay hidden" id="rpmOverlay" style="padding:0;background:#0a0a0f;justify-content:flex-start">
<div style="display:flex;align-items:center;padding:10px;background:#161620;border-bottom:1px solid #2a2a3a;width:100%;box-sizing:border-box;z-index:5">
<div style="flex:1;color:var(--accent);font-weight:700;letter-spacing:2px">READY PLAYER ME</div>
<button class="back-btn" style="position:static" onclick="closeRPMCreator()">닫기</button>
</div>
<iframe id="rpmFrame" style="flex:1;width:100%;height:calc(100vh - 50px);border:0" allow="camera *; microphone *; clipboard-write"></iframe>
</div>

<!-- CAREER SELECT -->
<div class="overlay hidden" id="careerMenu">
<div class="menu-title" style="font-size:32px">커리어 모드</div>
<div id="beltInfo" class="belt-display"></div>
<div id="careerRecord" style="font-size:13px;color:var(--dim);margin:8px 0"></div>
<div class="career-list" id="opponentList"></div>
</div>

<!-- TRAINING SELECT -->
<div class="overlay hidden" id="trainingMenu">
<div class="menu-title" style="font-size:32px">트레이닝</div>
<div class="menu-sub">능력치를 올려 더 강해지세요</div>
<div id="trainStats" class="stats-bar"></div>
<button class="menu-btn" onclick="startTraining('speedbag')"><span class="icon">&#x1F3AF;</span> 스피드백<span class="sub">리듬에 맞춰 탭! 스피드 향상</span></button>
<button class="menu-btn" onclick="startTraining('heavybag')"><span class="icon">&#x1F94A;</span> 헤비백<span class="sub">콤보 연습! 파워 향상</span></button>
<button class="menu-btn" onclick="startTraining('jumprope')"><span class="icon">&#x1F3C3;</span> 줄넘기<span class="sub">타이밍 게임! 스태미나 향상</span></button>
<button class="menu-btn" onclick="startTraining('sparring')"><span class="icon">&#x1F93C;</span> 스파링<span class="sub">AI와 연습! 방어력 향상</span></button>
<button class="menu-btn" onclick="showCombos()"><span class="icon">&#x1F4DA;</span> 콤비네이션 학습<span class="sub">8가지 클래식 콤보를 단계별로 마스터</span></button>
</div>

<!-- COMBO MENU -->
<div class="overlay hidden" id="comboMenu">
<div class="menu-title" style="font-size:32px">콤비네이션</div>
<div class="menu-sub">시연 → 가이드 → 메트로놈 → 응용 4단계 학습</div>
<div id="comboList" class="career-list"></div>
</div>

<!-- COMBO TRAINING OVERLAY -->
<div class="overlay hidden" id="comboTrainOverlay" style="background:transparent;pointer-events:none;justify-content:flex-start;padding-top:50px">
<div id="comboPhaseTitle" style="font-size:22px;font-weight:800;color:var(--gold);text-shadow:0 2px 8px #000;letter-spacing:3px;pointer-events:auto"></div>
<div id="comboNumberDisplay" style="font-size:48px;font-weight:900;color:var(--accent);margin-top:6px;text-shadow:0 0 20px rgba(230,57,70,.4);pointer-events:auto"></div>
<div id="comboNextHint" style="font-size:14px;color:var(--text);background:rgba(0,0,0,.7);padding:8px 16px;border-radius:20px;margin-top:8px;pointer-events:auto;border:1px solid var(--border);max-width:340px;text-align:center"></div>
<div id="comboArrowRow" style="display:flex;gap:6px;margin-top:14px;pointer-events:auto;flex-wrap:wrap;justify-content:center;max-width:340px"></div>
<div id="comboBpmBar" style="margin-top:14px;text-align:center;pointer-events:auto">
<div id="comboBpmLabel" style="font-size:11px;color:var(--dim)"></div>
<div style="width:240px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;margin:6px auto;overflow:hidden">
<div id="comboBpmTick" style="height:100%;background:var(--gold);width:0%;transition:width .04s linear"></div>
</div>
</div>
<div id="comboCoaching" style="margin-top:18px;padding:12px 18px;background:rgba(0,0,0,.78);border-radius:10px;font-size:13px;line-height:1.5;color:var(--text);max-width:360px;border-left:3px solid var(--accent);pointer-events:auto"></div>
<div id="comboScoreboard" style="margin-top:16px;font-size:12px;color:var(--dim);pointer-events:auto"></div>
</div>

<!-- RECORDS -->
<div class="overlay hidden" id="recordsMenu">
<div class="menu-title" style="font-size:32px">전적 / 스탯</div>
<div id="recordStats" class="stats-bar"></div>
<div id="recordSummary" style="margin:15px 0;text-align:center"></div>
<div class="fight-history" id="fightHistory"></div>
</div>

<!-- FIGHT HUD -->
<div class="hud-top hidden" id="fightHud">
<div>
<div class="hp-bar-wrap"><span class="hp-label" style="color:var(--green)" id="playerNameHud">플레이어</span><div class="hp-bar"><div class="fill player" id="phpBar" style="width:100%"></div></div></div>
<div style="display:flex;align-items:center;gap:6px;margin-top:4px"><span style="font-size:9px;color:var(--dim)">스태미나</span><div class="stamina-bar"><div class="fill" id="staminaBar" style="width:100%"></div></div></div>
</div>
<div style="text-align:center">
<div class="round-info" id="roundInfo">ROUND 1</div>
<div class="timer" id="fightTimer">3:00</div>
</div>
<div style="text-align:right">
<div class="hp-bar-wrap"><div class="hp-bar"><div class="fill opp" id="ohpBar" style="width:100%"></div></div><span class="hp-label" style="color:var(--accent)" id="oppNameHud">상대</span></div>
</div>
</div>

<div class="combo-popup" id="comboPopup"></div>
<div class="combo-counter hidden" id="comboCounter"></div>
<div class="controls-hint hidden" id="controlsHint">1/J=잽 2/K=크로스 3/L=훅 4/;=어퍼 | Q=슬립좌 E=슬립우 S=덕 | A=하이가드 D=로우가드</div>
<div class="rest-screen hidden" id="restScreen"><h2>&#55092;&#49885;</h2><div class="timer" id="restTimer">60</div><div style="font-size:13px;color:var(--dim);margin-top:10px">&#52404;&#47141;&#51060; &#54924;&#48373;&#46121;&#45768;&#45796;...</div><div id="restTip" style="margin-top:18px;padding:12px 18px;background:rgba(255,255,255,0.04);border-radius:10px;max-width:320px;font-size:12px;color:var(--dim);line-height:1.6;border-left:3px solid var(--yellow)"></div></div>
<div class="fight-result hidden" id="fightResult"></div>
<div class="level-up hidden" id="levelUp"></div>
<div class="train-result hidden" id="trainResult"></div>
<div class="train-overlay hidden" id="trainOverlay"></div>
<button class="back-btn hidden" id="backBtn" onclick="goBack()">&#x2190; 뒤로</button>

<!-- Camera controls -->
<div class="cam-controls hidden" id="camControls">
<button class="cam-btn small" onclick="camPreset('side')" title="사이드뷰">&#x25C0;&#x25B6;</button>
<button class="cam-btn small" onclick="camPreset('front')" title="정면뷰">&#x25BC;</button>
<button class="cam-btn small" onclick="camPreset('top')" title="탑뷰">&#x25CE;</button>
<button class="cam-btn small" onclick="camZoom(-1)" title="줌인">+</button>
<button class="cam-btn small" onclick="camZoom(1)" title="줌아웃">-</button>
<button class="cam-btn small" onclick="camReset()" title="리셋">&#x21BA;</button>
</div>
<div class="cam-hint" id="camHint">드래그=회전 · 휠/핀치=줌</div>

<!-- Mobile controls -->
<div class="mobile-controls hidden" id="mobileControls">
<div class="ctrl-row">
<div class="ctrl-btn def" ontouchstart="playerDodge('slipL')" onclick="playerDodge('slipL')">슬립←</div>

const RPM_SUBDOMAIN = 'demo';

function openRPMCreator() {
  const overlay = $('rpmOverlay');
  const frame = $('rpmFrame');
  frame.src = `https://${RPM_SUBDOMAIN}.readyplayer.me/avatar?frameApi&clearCache`;

}
function closeRPMCreator() {
  $('rpmOverlay').classList.add('hidden');
  $('rpmFrame').src = '';
  showMain && showMain();
}
function clearRPMAvatar() {
  localStorage.removeItem(RPM_KEY);

}

window.addEventListener('message', (event) => {
  let msg;
  try { msg = typeof event.data === 'string' ? JSON.parse(event.data) : event.data; } catch (e) { return; }
  if (!msg || msg.source !== 'readyplayerme') return;
  const frame = $('rpmFrame');
  if (msg.eventName === 'v1.frame.ready') {
    frame.contentWindow.postMessage(JSON.stringify({
      target: 'readyplayerme', type: 'subscribe', eventName: 'v1.**'
    }), '*');
    return;
  }
  if (msg.eventName === 'v1.avatar.exported' || msg.eventName === 'v2.avatar.exported') {
    const url = (msg.data && msg.data.url) || msg.data;
    if (typeof url === 'string' && url.endsWith('.glb')) {
      localStorage.setItem(RPM_KEY, url);
      closeRPMCreator();
      alert('아바타 저장 완료! 메인 메뉴 좌측에 미리보기가 표시됩니다.\n(권투 매치는 다음 업데이트에서 RPM 모델로 적용됩니다)');
      loadRPMPreview();
    }
  }
});

async function loadRPMPreview() {
  const url = localStorage.getItem(RPM_KEY);
  if (!url || typeof THREE === 'undefined' || typeof THREE.GLTFLoader === 'undefined') return;
  try {
    const loader = new THREE.GLTFLoader();
    const gltf = await new Promise((res, rej) => loader.load(url, res, undefined, rej));
    if (rpmPreviewModel && scene) scene.remove(rpmPreviewModel);
    rpmPreviewModel = gltf.scene;
    rpmPreviewModel.scale.setScalar(2.4);
    rpmPreviewModel.position.set(-3.5, 0, 1);
    rpmPreviewModel.rotation.y = 0.4;
    rpmPreviewModel.userData.isRPMPreview = true;
    if (scene) scene.add(rpmPreviewModel);
  } catch (e) { console.warn('RPM preview load failed', e); }
}

// ==================== AUDIO ====================
let audioCtx = null;
function aud() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }

function playPunch(type) {
  const a = aud(), t = a.currentTime;
  const o = a.createOscillator(), g = a.createGain(), f = a.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = type === 'heavy' ? 200 : type === 'hook' ? 350 : 500;
  const n = a.createBufferSource();
  const buf = a.createBuffer(1, a.sampleRate * 0.15, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (a.sampleRate * 0.03));
  n.buffer = buf;
  const ng = a.createGain();
  ng.gain.setValueAtTime(type === 'heavy' ? 0.6 : 0.4, t);
  ng.gain.linearRampToValueAtTime(0, t + 0.12);
  n.connect(ng).connect(f).connect(a.destination);
  o.frequency.value = type === 'heavy' ? 80 : type === 'hook' ? 120 : 180;
  g.gain.setValueAtTime(0.3, t);
  g.gain.linearRampToValueAtTime(0, t + 0.1);
  o.connect(g).connect(a.destination);
  o.start(t); o.stop(t + 0.1);
  n.start(t); n.stop(t + 0.15);
}

function playBell() {
  const a = aud(), t = a.currentTime;
  const o = a.createOscillator(), g = a.createGain();
  o.frequency.value = 800; o.type = 'sine';
  g.gain.setValueAtTime(0.4, t);
  g.gain.exponentialRampToValueAtTime(0.01, t + 1.5);
  o.connect(g).connect(a.destination);
  o.start(t); o.stop(t + 1.5);
  const o2 = a.createOscillator(), g2 = a.createGain();
  o2.frequency.value = 1200; o2.type = 'sine';
  g2.gain.setValueAtTime(0.2, t);
  g2.gain.exponentialRampToValueAtTime(0.01, t + 1.2);
  o2.connect(g2).connect(a.destination);
  o2.start(t); o2.stop(t + 1.2);
}

function playCrowd(intensity) {
  const a = aud(), t = a.currentTime;
  const buf = a.createBuffer(1, a.sampleRate * 0.5, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.08 * intensity * Math.sin(i / (a.sampleRate * 0.1));
  const n = a.createBufferSource(); n.buffer = buf;
  const f = a.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 600; f.Q.value = 0.5;
  const g = a.createGain(); g.gain.setValueAtTime(0.15 * intensity, t); g.gain.linearRampToValueAtTime(0, t + 0.5);
  n.connect(f).connect(g).connect(a.destination);
  n.start(t); n.stop(t + 0.5);
}

function playWhiff() {
  const a = aud(), t = a.currentTime;
  const buf = a.createBuffer(1, a.sampleRate * 0.08, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.15 * Math.exp(-i / (a.sampleRate * 0.02));
  const n = a.createBufferSource(); n.buffer = buf;
  const f = a.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 2000;
  const g = a.createGain(); g.gain.setValueAtTime(0.1, t); g.gain.linearRampToValueAtTime(0, t + 0.08);
  n.connect(f).connect(g).connect(a.destination); n.start(t); n.stop(t + 0.08);
}

function playStep() {
  const a = aud(), t = a.currentTime;
  const o = a.createOscillator(), g = a.createGain();
  o.frequency.value = 60 + Math.random() * 40; o.type = 'sine';
  g.gain.setValueAtTime(0.08, t); g.gain.linearRampToValueAtTime(0, t + 0.06);
  o.connect(g).connect(a.destination); o.start(t); o.stop(t + 0.06);
}

// ==================== THREE.JS SETUP ====================
if(typeof THREE==='undefined'){
  document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#e63946;font-size:20px;text-align:center;padding:20px;background:#0a0a10;font-family:sans-serif">Three.js 로딩 중...<br><small style="color:#888;font-size:14px">잠시 후 새로고침 해보세요</small></div>';

let scene, camera, renderer, clock;
let ringGroup, playerModel, oppModel;
let particles3D = [];
let cameraShake = { x: 0, y: 0, amount: 0 };
let koFlashLight = null;

// User-controlled orbit camera state
const camState = {
  azimuth: 0.55,    // horizontal angle (radians) - default 3/4 side over-shoulder
  polar: 1.25,      // vertical angle (0=top, PI=bottom)
  radius: 13,       // distance from target
  target: new THREE.Vector3(0, 2.2, 0.75),
  userActive: false,         // true after user touched the camera
  preset: 'auto',            // 'auto' | 'side' | 'front' | 'top'
  // input state
  dragging: false,
  lastX: 0, lastY: 0,
  pinchDist: 0,
};
const CAM_LIMITS = { polarMin: 0.25, polarMax: Math.PI - 0.25, radiusMin: 4, radiusMax: 22 };
const skinColor = 0xc8956c;
const darkSkin = 0xa07050;

function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050508);
  scene.fog = new THREE.FogExp2(0x050508, 0.015);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 4.5, 9);

  scene.add(redCorner);

// ==================== CAMERA CONTROLS ====================
function setupCameraControls() {
  const cv = $('c3d');
  // Mouse
  cv.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    camState.dragging = true; camState.lastX = e.clientX; camState.lastY = e.clientY;
    camState.userActive = true; flashCamHint();
  });
  window.addEventListener('mousemove', e => {
    if (!camState.dragging) return;
    const dx = e.clientX - camState.lastX, dy = e.clientY - camState.lastY;
    camState.azimuth -= dx * 0.005;
    camState.polar = clamp(camState.polar - dy * 0.005, CAM_LIMITS.polarMin, CAM_LIMITS.polarMax);
    camState.lastX = e.clientX; camState.lastY = e.clientY;
  });
  window.addEventListener('mouseup', () => { camState.dragging = false; });
  cv.addEventListener('wheel', e => {
    e.preventDefault();
    camState.radius = clamp(camState.radius * (1 + Math.sign(e.deltaY) * 0.08), CAM_LIMITS.radiusMin, CAM_LIMITS.radiusMax);
    camState.userActive = true; flashCamHint();
  }, { passive: false });
  // Touch
  cv.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      camState.dragging = true;
      camState.lastX = e.touches[0].clientX; camState.lastY = e.touches[0].clientY;
      camState.userActive = true; flashCamHint();
    } else if (e.touches.length === 2) {
      camState.dragging = false;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      camState.pinchDist = Math.hypot(dx, dy);
    }
  }, { passive: true });
  cv.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && camState.dragging) {
      const dx = e.touches[0].clientX - camState.lastX;
      const dy = e.touches[0].clientY - camState.lastY;
      camState.azimuth -= dx * 0.006;
      camState.polar = clamp(camState.polar - dy * 0.006, CAM_LIMITS.polarMin, CAM_LIMITS.polarMax);
      camState.lastX = e.touches[0].clientX; camState.lastY = e.touches[0].clientY;
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const d = Math.hypot(dx, dy);
      if (camState.pinchDist > 0) {
        const ratio = camState.pinchDist / d;
        camState.radius = clamp(camState.radius * ratio, CAM_LIMITS.radiusMin, CAM_LIMITS.radiusMax);
      }
      camState.pinchDist = d;
    }
  }, { passive: true });
  cv.addEventListener('touchend', e => {
    if (e.touches.length === 0) { camState.dragging = false; camState.pinchDist = 0; }
  });
}

function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

function applyOrbitCamera() {
  const t = camState.target;
  const r = camState.radius, p = camState.polar, a = camState.azimuth;
  const sinP = Math.sin(p), cosP = Math.cos(p);
  camera.position.set(
    t.x + r * sinP * Math.sin(a) + cameraShake.x,
    t.y + r * cosP + cameraShake.y,
    t.z + r * sinP * Math.cos(a)
  );
  camera.lookAt(t);
}

function camPreset(name) {
  camState.userActive = true;
  camState.preset = name;
  if (name === 'side')  { camState.azimuth =  Math.PI / 2; camState.polar = 1.45; camState.radius = 15; camState.target.set(0, 2, 0.75); }
  if (name === 'front') { camState.azimuth = 0;            camState.polar = 1.30; camState.radius = 11; camState.target.set(0, 2.2, 0.75); }
  if (name === 'top')   { camState.azimuth = 0;            camState.polar = 0.35; camState.radius = 13; camState.target.set(0, 0, 0.75); }
  flashCamHint();
}
function camZoom(dir) {
  camState.userActive = true;
  camState.radius = clamp(camState.radius * (1 + dir * 0.15), CAM_LIMITS.radiusMin, CAM_LIMITS.radiusMax);
}
function camReset() {
  camState.userActive = false;
  camState.preset = 'auto';
  camState.azimuth = 0.55; camState.polar = 1.25; camState.radius = 13; camState.target.set(0, 2.2, 0.75);
}
function flashCamHint() {
  const h = $('camHint'); if (!h) return;
  h.classList.add('show');
  clearTimeout(flashCamHint._t);
  flashCamHint._t = setTimeout(() => h.classList.remove('show'), 1400);
}

function onResize() {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
}

// ==================== BUILD 3D RING ====================
function buildRing() {
  ringGroup = new THREE.Group();

  // Ring canvas floor
  const floorGeo = new THREE.BoxGeometry(10, 0.3, 10);
  const floorCanvas = document.createElement('canvas');
  floorCanvas.width = 512; floorCanvas.height = 512;
  const fctx = floorCanvas.getContext('2d');
  fctx.fillStyle = '#2a1a28';
  fctx.fillRect(0, 0, 512, 512);
  // Ring mat texture
  fctx.strokeStyle = 'rgba(230,57,70,0.2)';
  fctx.lineWidth = 2;
  fctx.beginPath(); fctx.arc(256, 256, 100, 0, Math.PI * 2); fctx.stroke();
  // Corner marks
  fctx.fillStyle = 'rgba(230,57,70,0.1)';
  fctx.fillRect(0, 0, 60, 60);
  fctx.fillStyle = 'rgba(59,130,246,0.1)';
  fctx.fillRect(452, 452, 60, 60);
  // Grid lines
  fctx.strokeStyle = 'rgba(255,255,255,0.03)';
  fctx.lineWidth = 1;
  for (let i = 0; i < 512; i += 32) {
    fctx.beginPath(); fctx.moveTo(i, 0); fctx.lineTo(i, 512); fctx.stroke();
    fctx.beginPath(); fctx.moveTo(0, i); fctx.lineTo(512, i); fctx.stroke();
  }
  const floorTex = new THREE.CanvasTexture(floorCanvas);
  const floorMat = new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.8, metalness: 0.1 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.position.y = -0.15;
  floor.receiveShadow = true;
  ringGroup.add(floor);

  // Ring apron (sides)
  const apronMat = new THREE.MeshStandardMaterial({ color: 0x1a1520, roughness: 0.9 });
  const apronFront = new THREE.Mesh(new THREE.BoxGeometry(10.4, 1.2, 0.15), apronMat);
  apronFront.position.set(0, -0.6, 5.1);
  ringGroup.add(apronFront);
  const apronBack = apronFront.clone(); apronBack.position.z = -5.1; ringGroup.add(apronBack);
  const apronLeft = new THREE.Mesh(new THREE.BoxGeometry(0.15, 1.2, 10.4), apronMat);
  apronLeft.position.set(-5.1, -0.6, 0); ringGroup.add(apronLeft);
  const apronRight = apronLeft.clone(); apronRight.position.x = 5.1; ringGroup.add(apronRight);

  // Ground below ring
  const groundGeo = new THREE.PlaneGeometry(60, 60);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x0a0a10, roughness: 1 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -1.3;
  ground.receiveShadow = true;
  ringGroup.add(ground);

  // Corner posts
  const postMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.3 });
  const postGeo = new THREE.CylinderGeometry(0.12, 0.12, 3.5, 8);
  const corners = [[-5, 5], [5, 5], [-5, -5], [5, -5]];
  const cornerColors = [0xe63946, 0xe63946, 0x3b82f6, 0x3b82f6];
  const padGeo = new THREE.CylinderGeometry(0.2, 0.2, 3, 8);

  corners.forEach(([x, z], i) => {
    const post = new THREE.Mesh(postGeo, postMat);
    post.position.set(x, 1.5, z);
    post.castShadow = true;
    ringGroup.add(post);

    // Corner pad
    const padMat = new THREE.MeshStandardMaterial({ color: cornerColors[i], roughness: 0.6 });
    const pad = new THREE.Mesh(padGeo, padMat);
    pad.position.set(x, 1.5, z);
    pad.scale.set(1.3, 0.9, 1.3);
    ringGroup.add(pad);

    // Top ball
    const ball = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), postMat);
    ball.position.set(x, 3.25, z);
    ringGroup.add(ball);
  });

  // Ropes (3 levels)
  const ropeMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.5 });
  const ropeHeights = [1.0, 1.8, 2.6];
  ropeHeights.forEach(h => {
    // 4 sides
    const sides = [
      [[-5, h, 5], [5, h, 5]],
      [[-5, h, -5], [5, h, -5]],
      [[-5, h, 5], [-5, h, -5]],
      [[5, h, 5], [5, h, -5]]
    ];
    sides.forEach(([a, b]) => {
      const dx = b[0] - a[0], dz = b[2] - a[2];
      const len = Math.sqrt(dx * dx + dz * dz);
      const ropeGeo = new THREE.CylinderGeometry(0.03, 0.03, len, 4);
      const rope = new THREE.Mesh(ropeGeo, ropeMat);
      rope.position.set((a[0] + b[0]) / 2, h, (a[2] + b[2]) / 2);
      rope.rotation.z = Math.PI / 2;
      if (dz !== 0) { rope.rotation.z = 0; rope.rotation.x = Math.PI / 2; }
      ringGroup.add(rope);
    });
  });

  // Turnbuckles
  const tbGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
  const tbMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.2 });
  corners.forEach(([x, z]) => {
    ropeHeights.forEach(h => {
      const tb = new THREE.Mesh(tbGeo, tbMat);
      tb.position.set(x, h, z);
      ringGroup.add(tb);
    });
  });

  scene.add(ringGroup);
}

function buildCrowd() {
  const crowdGroup = new THREE.Group();
  const headGeo = new THREE.SphereGeometry(0.3, 6, 4);
  const bodyGeo = new THREE.BoxGeometry(0.4, 0.6, 0.3);

  for (let row = 0; row < 3; row++) {
    for (let i = 0; i < 40; i++) {
      const angle = (i / 40) * Math.PI * 2;
      const r = 9 + row * 2;
      const x = Math.cos(angle) * r;
      const z = Math.sin(angle) * r;
      const shade = 0.05 + Math.random() * 0.1;
      const mat = new THREE.MeshStandardMaterial({ color: new THREE.Color(shade, shade, shade + 0.02) });
      const head = new THREE.Mesh(headGeo, mat);
      head.position.set(x, 0.5 + row * 0.5, z);
      crowdGroup.add(head);
      const body = new THREE.Mesh(bodyGeo, mat);
      body.position.set(x, 0 + row * 0.5, z);
      crowdGroup.add(body);
    }
  }
  scene.add(crowdGroup);
}

// Smoothstep interpolation
function smooth(t) { return t * t * (3 - 2 * t); }
function lrp(a, b, t) { return a + (b - a) * t; }

function getPoseAt(kframes, t) {
  let k0 = kframes[0], k1 = kframes[kframes.length - 1];
  for (let i = 0; i < kframes.length - 1; i++) {
    if (t >= kframes[i].t && t <= kframes[i + 1].t) {
      k0 = kframes[i]; k1 = kframes[i + 1]; break;
    }
  }
  const range = k1.t - k0.t;
  const lt = range > 0 ? (t - k0.t) / range : 0;
  const e = smooth(lt);
  const p0 = k0.p ? { ...GUARD, ...k0.p } : { ...GUARD };
  const p1 = k1.p ? { ...GUARD, ...k1.p } : { ...GUARD };
  const result = {};
  const keys = new Set([...Object.keys(p0), ...Object.keys(p1)]);
  for (const k of keys) {
    const a = p0[k] !== undefined ? p0[k] : (GUARD[k] || 0);
    const b = p1[k] !== undefined ? p1[k] : (GUARD[k] || 0);
    result[k] = lrp(a, b, e);
  }
  return result;
}

function applyPose(model, pose) {
  if (!model.root) return;
  model.root.position.x = pose.rootX || 0;
  model.root.position.z = pose.rootZ || 0;
  model.pelvis.position.y = pose.pelvisY || 0.88;
  model.pelvis.rotation.y = pose.pelvisRY || -0.45;
  model.spine.rotation.x = pose.spineRX || 0;
  model.spine.rotation.y = pose.spineRY || 0;
  model.spine.rotation.z = pose.spineRZ || 0;
  model.chest.rotation.x = pose.chestRX || 0;
  model.chest.rotation.y = pose.chestRY || 0;
  model.chest.rotation.z = pose.chestRZ || 0;
  model.headGrp.rotation.x = pose.headRX || -0.12;
  model.headGrp.rotation.y = pose.headRY || 0.2;
  model.headGrp.rotation.z = pose.headRZ || 0;
  model.lSh.rotation.set(pose.lShX || -1.3, pose.lShY || 0, pose.lShZ || 0);
  model.lEl.rotation.set(pose.lElX || -1.6, pose.lElY || 0, pose.lElZ || 0);
  model.rSh.rotation.set(pose.rShX || -1.5, pose.rShY || 0, pose.rShZ || 0);
  model.rEl.rotation.set(pose.rElX || -1.8, pose.rElY || 0, pose.rElZ || 0);
  model.lHip.rotation.set(pose.lHipX || 0, pose.lHipY || 0, pose.lHipZ || 0);
  model.lKn.rotation.x = pose.lKnX || 0.2;
  model.lAnk.rotation.x = pose.lAnkX || 0;
  model.rHip.rotation.set(pose.rHipX || 0, pose.rHipY || 0, pose.rHipZ || 0);
  model.rKn.rotation.x = pose.rKnX || 0.22;
  model.rAnk.rotation.x = pose.rAnkX || -0.15;
}

// ==================== 3D ANIMATIONS ====================
function animateBoxerIdle(model, time) {
  const p = model.idle.phase;
  const bob = Math.sin(time * 2.5 + p) * 0.015;
  const sway = Math.sin(time * 1.8 + p) * 0.02;
  // Apply guard as base, then add idle motion
  const pose = { ...GUARD };
  pose.pelvisY = (GUARD.pelvisY || 0.88) + bob;
  pose.spineRZ = sway;
  pose.lShZ = (GUARD.lShZ || 0.6) + Math.sin(time * 3 + p) * 0.02;
  pose.rShZ = (GUARD.rShZ || -0.35) + Math.sin(time * 3 + p + 1) * 0.02;
  applyPose(model, pose);
}

function animatePunch(model, punchType, progress, isOpp) {
  const kfName = punchType; // jab, cross, hook, uppercut
  const kf = PUNCH_KF[kfName];
  if (!kf) return;
  const pose = getPoseAt(kf, progress);
  applyPose(model, pose);
}

function animateHit(model, progress) {
  const snap = Math.sin(progress * Math.PI);
  const pose = { ...GUARD };
  pose.spineRX = (GUARD.spineRX || 0) - snap * 0.15;
  pose.headRX = (GUARD.headRX || -0.12) - snap * 0.2;
  pose.pelvisY = (GUARD.pelvisY || 0.88) - snap * 0.02;
  applyPose(model, pose);
}

function animateBlock(model, guardType) {
  const overrides = guardType === 'high' ? DEFENSE_KF.highGuard : DEFENSE_KF.lowGuard;
  const pose = { ...GUARD, ...overrides };
  applyPose(model, pose);
}

function animateDodge(model, dodgeType, progress) {
  const kf = DEFENSE_KF[dodgeType];
  if (!kf || !Array.isArray(kf)) return;
  const pose = getPoseAt(kf, progress);
  applyPose(model, pose);
}

function resetBoxerPose(model) {
  applyPose(model, GUARD);
  model.group.position.x = model.group.userData.baseX || 0;
}

// ==================== PUNCH TRAIL SYSTEM ====================
let punchTrails = [];

function updatePunchTrail(model, isPunching) {
  if (!isPunching) return;
  // Get world positions of both gloves
  const lPos = new THREE.Vector3();
  const rPos = new THREE.Vector3();
  model.lGlove.getWorldPosition(lPos);
  model.rGlove.getWorldPosition(rPos);

  // Store trail points
  if (!model._trailPoints) model._trailPoints = [];
  model._trailPoints.push({ pos: lPos.clone(), time: performance.now() });
  model._trailPoints.push({ pos: rPos.clone(), time: performance.now() });

  // Remove old points (>500ms)
  const now = performance.now();
  model._trailPoints = model._trailPoints.filter(p => now - p.time < 500);

  // Draw trail line
  if (model._trailLine) { scene.remove(model._trailLine); model._trailLine.geometry.dispose(); model._trailLine.material.dispose(); }
  if (model._trailPoints.length > 2) {
    const points = model._trailPoints.map(p => p.pos);
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({ color: 0xe63946, transparent: true, opacity: 0.6, linewidth: 2 });
    model._trailLine = new THREE.Line(geo, mat);
    scene.add(model._trailLine);
  }
}

function clearTrails(model) {
  if (model._trailLine) { scene.remove(model._trailLine); model._trailLine.geometry.dispose(); model._trailLine.material.dispose(); model._trailLine = null; }
  model._trailPoints = [];
}

// ==================== KINETIC CHAIN GLOW ====================
let glowJoints = [];

function showKineticChainGlow(model, punchType, progress) {
  // Clear previous glow
  glowJoints.forEach(g => { if (g.mesh) { g.mesh.material.emissive.setHex(0x000000); g.mesh.material.emissiveIntensity = 0; }});
  glowJoints = [];

  if (progress <= 0 || progress >= 1) return;

  // Kinetic chain: foot → knee → hip → spine → shoulder → elbow → glove
  // Each joint glows in sequence based on progress
  const chainParts = [];
  if (punchType === 'jab' || punchType === 'hook') {
    chainParts.push(
      { mesh: model.lShoe, start: 0, end: 0.15 },
      { mesh: model.lKnee, start: 0.1, end: 0.25 },
      { mesh: model.torso, start: 0.2, end: 0.35 },
      { mesh: model.lShoulder, start: 0.25, end: 0.45 },
      { mesh: model.lForearm, start: 0.35, end: 0.55 },
      { mesh: model.lGlove, start: 0.4, end: 0.7 }
    );
  } else { // cross, uppercut - rear hand
    chainParts.push(
      { mesh: model.rShoe, start: 0, end: 0.15 },
      { mesh: model.rKnee, start: 0.1, end: 0.25 },
      { mesh: model.torso, start: 0.2, end: 0.35 },
      { mesh: model.rShoulder, start: 0.25, end: 0.45 },
      { mesh: model.rForearm, start: 0.35, end: 0.55 },
      { mesh: model.rGlove, start: 0.4, end: 0.7 }
    );
  }

  chainParts.forEach(cp => {
    if (!cp.mesh || !cp.mesh.material) return;
    const intensity = (progress >= cp.start && progress <= cp.end) ?
      Math.sin((progress - cp.start) / (cp.end - cp.start) * Math.PI) : 0;
    if (intensity > 0.1) {
      cp.mesh.material.emissive = cp.mesh.material.emissive || new THREE.Color();
      cp.mesh.material.emissive.setHex(0xff6600);
      cp.mesh.material.emissiveIntensity = intensity * 0.5;
      glowJoints.push(cp);
    }
  });
}

function clearGlow() {
  glowJoints.forEach(g => { if (g.mesh && g.mesh.material) { g.mesh.material.emissive.setHex(0x000000); g.mesh.material.emissiveIntensity = 0; }});
  glowJoints = [];
}

  // Left foot (lead) - forward, 45 degrees

  lGuide.rotation.x = -Math.PI / 2;

  // Right foot (rear) - back, 60-70 degrees
  const rGuide = new THREE.Mesh(new THREE.RingGeometry(0.05, 0.12, 16), guideMat);
  rGuide.rotation.x = -Math.PI / 2;
  rGuide.position.set(0.09, 0.01, -0.1);

  // Stance width line
  const lineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-0.09, 0.01, 0.15),
    new THREE.Vector3(0.09, 0.01, -0.1)

  footGuides.visible = false;
  scene.add(footGuides);
}

// ==================== ENHANCED SOUND SYSTEM ====================
function playPunchEnhanced(type, intensity) {
  const a = aud(), t = a.currentTime;

  // Impact noise burst
  const buf = a.createBuffer(1, a.sampleRate * 0.12, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (a.sampleRate * 0.025));
  const n = a.createBufferSource(); n.buffer = buf;
  const ng = a.createGain();
  ng.gain.setValueAtTime((intensity || 1) * 0.5, t);
  ng.gain.linearRampToValueAtTime(0, t + 0.1);

  // Low-frequency thump (body impact feel)
  const osc = a.createOscillator();
  const oscGain = a.createGain();
  osc.frequency.value = type === 'uppercut' ? 70 : type === 'hook' ? 100 : type === 'cross' ? 120 : 180;
  osc.type = 'sine';
  oscGain.gain.setValueAtTime(0.3 * (intensity || 1), t);
  oscGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);

  // Filter for realistic sound
  const filter = a.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = type === 'hook' || type === 'uppercut' ? 400 : 800;

  n.connect(ng).connect(filter).connect(a.destination);
  osc.connect(oscGain).connect(a.destination);
  n.start(t); n.stop(t + 0.12);
  osc.start(t); osc.stop(t + 0.15);

  // High-frequency snap for jab
  if (type === 'jab') {
    const snap = a.createOscillator();
    const snapG = a.createGain();
    snap.frequency.value = 3000;
    snap.type = 'sawtooth';
    snapG.gain.setValueAtTime(0.08, t);
    snapG.gain.linearRampToValueAtTime(0, t + 0.03);
    snap.connect(snapG).connect(a.destination);
    snap.start(t); snap.stop(t + 0.03);
  }
}

// ==================== 3D PARTICLES ====================
const particleMat = new THREE.MeshBasicMaterial({ transparent: true });

function spawnParticles3D(pos, color, count, type) {
  for (let i = 0; i < count; i++) {
    const geo = type === 'star' ?
      new THREE.OctahedronGeometry(0.04 + Math.random() * 0.04, 0) :
      new THREE.SphereGeometry(0.03 + Math.random() * 0.03, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color, transparent: true });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    mesh.position.x += (Math.random() - 0.5) * 0.3;
    mesh.position.y += (Math.random() - 0.5) * 0.3;
    mesh.position.z += (Math.random() - 0.5) * 0.3;
    scene.add(mesh);
    particles3D.push({
      mesh,
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * 2 + 1,
      vz: (Math.random() - 0.5) * 3,
      life: 0.5 + Math.random() * 0.5,
      maxLife: 0.5 + Math.random() * 0.5
    });
  }
}

function updateParticles3D(dt) {
  for (let i = particles3D.length - 1; i >= 0; i--) {
    const p = particles3D[i];
    p.life -= dt;
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.vy -= 5 * dt; // gravity
    p.mesh.position.z += p.vz * dt;
    p.mesh.material.opacity = Math.max(0, p.life / p.maxLife);
    p.mesh.scale.setScalar(p.life / p.maxLife);
    if (p.life <= 0) {
      scene.remove(p.mesh);
      p.mesh.geometry.dispose();
      p.mesh.material.dispose();
      particles3D.splice(i, 1);
    }
  }
}

function playerPunch(type) {
  // Combo training intercept
  if (currentScreen === 'combo' && comboState) {
    comboHandlePunch(type);
    // Trigger animation on player model directly
    if (!currentFight) currentFight = {};
    currentFight.playerPunchAnim = 0.001;
    currentFight.playerPunchType = type;
    return;
  }
  const f = currentFight;
  if (!f || !f.active || f.phase !== 'fight') return;
  if (f.playerActionTime > 0) return;

  const staminaCost = { jab: 5, cross: 8, hook: 10, uppercut: 12 };
  const cost = staminaCost[type] || 8;
  if (f.stamina < cost) return;
  f.stamina -= cost;

  const speed = save.stats.speed;
  const power = save.stats.power;
  const baseDmg = { jab: 4, cross: 7, hook: 9, uppercut: 11 };
  let dmg = baseDmg[type] * (1 + power / 100);

  if (f.counterWindow) {
    dmg *= 2;
    f.counterWindow = false;
    showComboText('카운터! x2');
    playCrowd(0.8);
  }

  const now = performance.now();
  if (now - f.comboTimer < 1200) {
    f.combo.push(type);
    const chain = f.combo.join('-');
    if (chain.includes('jab-cross-hook')) { dmg *= 1.5; showComboText('잽-크로스-훅!'); f.combo = []; }
    else if (chain.includes('jab-jab-cross')) { dmg *= 1.3; showComboText('더블잽-크로스!'); f.combo = []; }
    else if (chain.includes('jab-cross-uppercut')) { dmg *= 1.4; showComboText('잽-크로스-어퍼!'); f.combo = []; }
    f.comboCount = f.combo.length;
  } else {
    f.combo = [type];
    f.comboCount = 1;
  }
  f.comboTimer = now;

  const oppDef = f.opp.defense;
  const dodgeChance = oppDef / 300;
  const blockChance = oppDef / 200;

  if (f.oppAction === 'dodge' || (Math.random() < dodgeChance && f.opp.pattern !== 'beginner')) {
    playWhiff();
    f.oppAction = null;
  } else if (Math.random() < blockChance) {
    dmg *= 0.2;
    playPunch('light');
    f.oppHitAnim = 0.15;
  } else {
    f.oppHP -= dmg;
    f.totalPlayerHits++;
    f.totalPlayerDmg += dmg;
    if(f.punchTypeCounts && f.punchTypeCounts[type] !== undefined) f.punchTypeCounts[type]++;
    f.oppHitAnim = 0.3;
    f.shakeAmount = Math.min(dmg / 3, 8);
    f.flashAmount = 0.3;
    playPunch(type === 'hook' || type === 'uppercut' ? 'heavy' : 'light');
    playCrowd(Math.min(1, f.crowdIntensity + 0.1));
    f.crowdIntensity = Math.min(1, f.crowdIntensity + 0.05);

    // 3D particles - impact sparks/stars
    const hitPos = new THREE.Vector3();
    oppModel.head.getWorldPosition(hitPos);
    spawnParticles3D(hitPos, 0xffaa00, 6, 'star');
    // Sweat particles
    spawnParticles3D(hitPos, 0xddddee, 4, 'drop');

    if (f.oppHP <= 0) {
      f.oppHP = 0;
      f.oppKnockdowns++;
      if (f.oppKnockdowns >= 3 || f.oppHP <= -20) {
        f.phase = 'ko';
        f.koTimer = 3;
        f.slowMo = true;
        f.slowMoTimer = 2;
        showComboText('K.O.!!');
        playCrowd(1);
        // KO flash
        koFlashLight.intensity = 5;
        // KO dramatic particles
        spawnParticles3D(hitPos, 0xffd700, 25, 'star');
        spawnParticles3D(hitPos, 0xe63946, 15, 'star');
      } else {
        f.oppHP = 15;
        showComboText('다운!');
      }
    }
  }

  f.playerPunchAnim = 0.35;
  f.playerPunchType = type;
  f.playerActionTime = (0.25 - speed / 500);

  // Show coaching tip occasionally
  showCoachingTip(type);
}

// ==================== OPPONENT AI ====================
function updateOpponentAI(dt) {
  const f = currentFight;
  if (!f || f.phase !== 'fight') return;
  const opp = f.opp;

  f.oppAttackTimer -= dt;
  if (f.oppAttackTimer > 0) return;

  const spd = opp.speed / 100;
  let attackDelay = 1.5 - spd * 0.8;
  let punchType, targetZone;

  switch (opp.pattern) {
    case 'beginner':
      attackDelay = 2.5 - spd * 0.5;
      punchType = Math.random() > 0.6 ? 'cross' : 'jab';
      targetZone = 'head'; break;
    case 'jabber':
      attackDelay = 0.8 - spd * 0.2;
      punchType = Math.random() > 0.7 ? 'cross' : 'jab';
      targetZone = 'head'; break;
    case 'power':
      attackDelay = 2.0 - spd * 0.4;
      punchType = ['cross', 'hook', 'uppercut'][Math.floor(Math.random() * 3)];
      targetZone = Math.random() > 0.5 ? 'head' : 'body'; break;
    case 'counter':
      attackDelay = 1.8;
      if (f.playerPunchAnim > 0) { punchType = 'cross'; attackDelay = 0.3; }
      else punchType = 'jab';
      targetZone = 'head'; break;
    case 'switch':
      attackDelay = 1.2 - spd * 0.3;
      punchType = ['jab', 'cross', 'hook', 'uppercut'][Math.floor(Math.random() * 4)];
      targetZone = Math.random() > 0.5 ? 'head' : 'body'; break;
    case 'combo':
      attackDelay = 0.4;
      const comboPatterns = [['jab', 'cross', 'hook'], ['jab', 'jab', 'cross'], ['cross', 'hook', 'uppercut']];
      const cp = comboPatterns[Math.floor(Math.random() * comboPatterns.length)];
      punchType = cp[Math.floor(f.oppAttackTimer * -3) % cp.length] || 'jab';
      targetZone = 'head'; break;
    case 'infighter':
      attackDelay = 0.7 - spd * 0.15;
      punchType = ['hook', 'uppercut', 'cross'][Math.floor(Math.random() * 3)];
      targetZone = Math.random() > 0.4 ? 'body' : 'head'; break;
    case 'defensive':
      attackDelay = 2.5;
      punchType = Math.random() > 0.5 ? 'jab' : 'cross';
      targetZone = 'head'; break;
    case 'outboxer':
      attackDelay = 1.0 - spd * 0.2;
      punchType = Math.random() > 0.6 ? 'jab' : Math.random() > 0.5 ? 'cross' : 'hook';
      targetZone = 'head'; break;
    case 'champion':
      attackDelay = 0.6 - spd * 0.1;
      punchType = ['jab', 'cross', 'hook', 'uppercut'][Math.floor(Math.random() * 4)];
      targetZone = Math.random() > 0.5 ? 'head' : 'body'; break;
    default:
      punchType = 'jab'; targetZone = 'head';
  }

  f.oppAttackTimer = Math.max(0.3, attackDelay + Math.random() * 0.5);

  const baseDmg = { jab: 3, cross: 6, hook: 8, uppercut: 10 };
  let dmg = (baseDmg[punchType] || 5) * (1 + opp.power / 100);
  const def = save.stats.defense;

  if (f.playerDodgeTime > 0.1) {
    const dodgeMatch = (punchType === 'hook' && f.playerDodge === 'duck') ||
      ((punchType === 'jab' || punchType === 'cross') && (f.playerDodge === 'slipL' || f.playerDodge === 'slipR'));
    if (dodgeMatch || f.playerDodge) {
      f.totalDodges++;
      playWhiff();
      f.oppPunchAnim = 0.3;
      f.oppPunchType = punchType;
      return;
    }
  }

  if (f.playerGuard === 'high' && targetZone === 'head') {
    dmg *= 0.15; f.totalBlocks++; playPunch('light');
  } else if (f.playerGuard === 'low' && targetZone === 'body') {
    dmg *= 0.15; f.totalBlocks++; playPunch('light');
  } else if (f.playerGuard !== 'none') {
    dmg *= 0.6; playPunch('light');
  }

  dmg *= (1 - def / 200);
  const chinBonus = save.stats.chin / 100;
  dmg *= (1 - chinBonus * 0.3);

  f.playerHP -= dmg;
  f.totalOppHits++;
  f.totalOppDmg += dmg;
  f.playerHitAnim = 0.3;
  f.shakeAmount = Math.min(dmg / 4, 6);
  playPunch(punchType === 'hook' || punchType === 'uppercut' ? 'heavy' : 'light');

  f.oppPunchAnim = 0.3;
  f.oppPunchType = punchType;

  // 3D particles on player hit
  const hitPos = new THREE.Vector3();
  playerModel.head.getWorldPosition(hitPos);
  spawnParticles3D(hitPos, 0xaabbcc, 3, 'drop');
  if (dmg > 6) spawnParticles3D(hitPos, 0xe63946, 2, 'star');

  if (f.playerHP <= 0) {
    f.playerHP = 0;
    f.knockdowns++;
    if (f.knockdowns >= 3) {
      f.phase = 'ko';
      f.koTimer = 3;
      f.slowMo = true;
      f.slowMoTimer = 2;
      showComboText('다운...');
      koFlashLight.intensity = 3;
    } else {
      f.playerHP = 10;
      showComboText('다운!');
    }
  }
}

// ==================== FIGHT UPDATE ====================
function updateFight(dt) {
  const f = currentFight;
  if (!f || !f.active) return;

  if (f.slowMo) {
    f.slowMoTimer -= dt;
    dt *= 0.2;
    if (f.slowMoTimer <= 0) f.slowMo = false;
  }

  // KO flash decay
  if (koFlashLight.intensity > 0) koFlashLight.intensity *= Math.pow(0.1, dt);

  if (f.phase === 'fight') {
    f.timer -= dt;
    if (f.timer <= 0) {
      f.timer = 0;
      if (f.round >= f.maxRounds) { endFight(); return; }
      f.phase = 'rest';
      f.restTimer = 10;
      $('restScreen').classList.remove('hidden');
      showRestTip(f);
      playBell();
      return;
    }

    f.playerActionTime = Math.max(0, f.playerActionTime - dt);
    f.playerDodgeTime = Math.max(0, f.playerDodgeTime - dt);
    f.playerPunchAnim = Math.max(0, f.playerPunchAnim - dt);
    f.oppPunchAnim = Math.max(0, f.oppPunchAnim - dt);
    f.playerHitAnim = Math.max(0, f.playerHitAnim - dt);
    f.oppHitAnim = Math.max(0, f.oppHitAnim - dt);
    f.counterTimer -= dt;
    if (f.counterTimer <= 0) f.counterWindow = false;

    f.stamina = Math.min(f.maxStamina, f.stamina + (8 + save.stats.stamina / 10) * dt);
    f.crowdIntensity = Math.max(0.1, f.crowdIntensity - 0.02 * dt);
    f.shakeAmount *= Math.pow(0.05, dt);
    f.flashAmount *= Math.pow(0.01, dt);

    updateOpponentAI(dt);
    updateFightHUD();

    // Update combo counter visibility
    if (f.comboCount <= 1) {
      $('comboCounter').style.opacity = '0';
    }
  } else if (f.phase === 'rest') {
    f.restTimer -= dt;
    $('restTimer').textContent = Math.ceil(f.restTimer);
    f.playerHP = Math.min(f.playerMaxHP, f.playerHP + 15 * dt);
    f.oppHP = Math.min(f.oppMaxHP, f.oppHP + 10 * dt);
    f.stamina = f.maxStamina;
    if (f.restTimer <= 0) {
      f.round++;
      f.timer = 180;
      f.phase = 'fight';
      $('restScreen').classList.add('hidden');
      playBell();
    }
  } else if (f.phase === 'ko') {
    f.koTimer -= dt;
    if (f.koTimer <= 0) endFight();
  }
}

function showRestTip(f) {
  var tip = $('restTip');
  if(!tip) return;
  var idx = (f.round - 1) % REST_TIPS.length;
  var text = REST_TIPS[idx];
  if(f.totalPlayerHits < f.totalOppHits) text = '⚠️ 피격이 많습니다. 가드와 회피를 더 적극적으로 활용해보세요.';
  tip.textContent = text;
}

function endFight() {
  const f = currentFight;
  f.active = false;
  f.phase = 'result';

  const playerWin = f.oppHP <= 0 || f.playerHP > f.oppHP;
  const isKO = f.oppHP <= 0 || f.playerHP <= 0;
  const result = playerWin ? 'win' : 'lose';

  if (playerWin) {
    save.record.wins++;
    if (isKO && f.oppHP <= 0) save.record.kos++;
  } else {
    save.record.losses++;
    if (isKO && f.playerHP <= 0) save.record.koLosses++;
  }

  const xpGain = playerWin ? 50 + (f.isCareer ? f.oppIdx * 10 : 20) : 15;
  save.xp += xpGain;

  if (playerWin && f.isCareer && f.opp.belt) {
    const oppBeltIdx = BELT_ORDER.indexOf(f.opp.belt);
    const myBeltIdx = BELT_ORDER.indexOf(save.belt);
    if (oppBeltIdx > myBeltIdx) save.belt = f.opp.belt;
  }

  if (playerWin && f.isCareer && f.oppIdx !== undefined) {
    save.unlockedOpponents = Math.max(save.unlockedOpponents, f.oppIdx + 2);
  }

  save.fightHistory.push({
    opponent: f.opp.name, result,
    ko: isKO, rounds: f.round,
    playerDmg: Math.round(f.totalPlayerDmg),
    oppDmg: Math.round(f.totalOppDmg)
  });

  // Pass session data to Training Hub
  try {
    const duration = Math.round(f.round * 3);
    sessionStorage.setItem('boxingSessionResult', JSON.stringify({
      punches: f.totalPlayerHits,
      time: duration,
      combos: f.comboCount || 0
    }));
    if(f.punchTypeCounts){
      sessionStorage.setItem('boxingPunchTypes', JSON.stringify(f.punchTypeCounts));
    }
  } catch(e){}

  saveSave();

  $('fightResult').classList.remove('hidden');
  $('fightResult').innerHTML = `
    <div class="result-text ${playerWin ? (isKO && f.oppHP <= 0 ? 'ko' : 'win') : 'lose'}">
      ${playerWin ? (isKO && f.oppHP <= 0 ? 'K.O. 승리!' : '판정 승리!') : (isKO ? 'K.O. 패배...' : '판정 패배...')}
    </div>
    <div class="result-stats">
      <div>상대: <b>${f.opp.name}</b></div>
      <div>라운드: <b>${f.round}/${f.maxRounds}</b></div>
      <div>클린 히트: <b>${f.totalPlayerHits}</b> | 피격: <b>${f.totalOppHits}</b></div>
      <div>총 데미지: <b>${Math.round(f.totalPlayerDmg)}</b> | 피해: <b>${Math.round(f.totalOppDmg)}</b></div>
      <div>회피: <b>${f.totalDodges}</b> | 블록: <b>${f.totalBlocks}</b></div>
      <div style="color:var(--gold);margin-top:8px">XP +${xpGain}</div>
      ${f.opp.belt && playerWin ? `<div style="color:var(--gold);font-size:18px;margin-top:8px">&#x1F3C6; ${BELT_NAMES[f.opp.belt]} 획득!</div>` : ''}
    </div>
    <button class="confirm-btn" onclick="afterFight()">확인</button>
  `;
  playCrowd(playerWin ? 1 : 0.3);
  if (playerWin) playBell();
}

function afterFight() {
  $('fightResult').classList.add('hidden');
  if (save.xp >= save.xpNext) {
    save.xp -= save.xpNext;
    save.level++;
    save.xpNext = Math.floor(save.xpNext * 1.3);
    showLevelUp();
  } else { saveSave(); showMain(); }
}

function showLevelUp() {
  $('levelUp').classList.remove('hidden');
  let points = 3;
  const alloc = { speed: 0, power: 0, stamina: 0, defense: 0, chin: 0 };

  function render() {
    $('levelUp').innerHTML = `
      <h2>LEVEL UP! Lv.${save.level}</h2>
      <div style="font-size:14px;color:var(--dim);margin-bottom:10px">포인트 ${points}개를 배분하세요</div>
      <div class="stat-alloc">
        ${['speed', 'power', 'stamina', 'defense', 'chin'].map(s => `
          <div class="stat-alloc-row">
            <span class="sname">${{ speed: '스피드', power: '파워', stamina: '스태미나', defense: '방어력', chin: '턱' }[s]}</span>
            <span class="sval">${save.stats[s]}</span>
            <button class="alloc-btn" onclick="allocStat('${s}')" ${points <= 0 ? 'disabled' : ''}>+</button>
            <span style="color:var(--green);font-size:12px">${alloc[s] > 0 ? '+' + alloc[s] : ''}</span>
          </div>
        `).join('')}
      </div>
      <button class="confirm-btn" onclick="confirmLevelUp()" ${points > 0 ? 'disabled' : ''}>확인 (${points} 남음)</button>
    `;
    window.allocStat = function (s) {
      if (points <= 0) return;
      save.stats[s] += 2; alloc[s] += 2; points--; render();
    };
    window.confirmLevelUp = function () {
      if (points > 0) return;
      $('levelUp').classList.add('hidden');
      saveSave(); showMain();
    };
  }
  render();
}
